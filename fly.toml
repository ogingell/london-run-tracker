# Fly.io configuration for London Run Tracker
app = "london-run-tracker"
primary_region = "lhr"  # London — closest to Overpass API and your data

[build]

[env]
  PORT = "3001"
  NODE_ENV = "production"
  DB_PATH = "/data/london-runs.db"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume — SQLite database lives here and survives restarts/redeploys
[[mounts]]
  source = "london_run_data"
  destination = "/data"
